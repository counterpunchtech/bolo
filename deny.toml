[advisories]
version = 2
# Transitive deps from iroh ecosystem with no upstream fix available
ignore = [
    "RUSTSEC-2023-0089", # proc-macro-error unmaintained (via genawaiter -> iroh-blobs)
    "RUSTSEC-2024-0436", # paste unmaintained (transitive)
    "RUSTSEC-2024-0370", # proc-macro-error2 (transitive)
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "Unlicense",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
